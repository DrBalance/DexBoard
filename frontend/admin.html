<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스크리너 관리 — DrBalance</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --blue:#58a6ff;--blue-dim:#1f6feb;--green:#3fb950;--red:#f85149;
  --yellow:#d29922;--orange:#f0883e;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;border-bottom:1px solid var(--border);background:var(--bg2)}
.logo{font-size:17px;font-weight:700}.logo span{color:var(--orange)}
.back-btn{color:var(--blue);text-decoration:none;font-size:13px;padding:5px 12px;border:1px solid var(--blue-dim);border-radius:5px}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:80vh}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:40px;width:360px;text-align:center}
.auth-title{font-size:18px;font-weight:700;margin-bottom:8px}
.auth-sub{color:var(--text3);font-size:13px;margin-bottom:24px}
.auth-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:6px;font-size:14px;font-family:var(--mono);margin-bottom:12px}
.auth-input:focus{outline:none;border-color:var(--blue)}
.auth-btn{width:100%;background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-dim);border-radius:6px;padding:10px;font-size:14px;font-weight:600;cursor:pointer}
.auth-btn:hover{background:var(--blue);color:#000}
.auth-error{color:var(--red);font-size:13px;margin-top:8px}
#main-screen{display:none;padding:24px 28px;max-width:1200px;margin:0 auto}
.db-stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:14px 20px;flex:1;min-width:120px}
.stat-num{font-size:24px;font-weight:700;color:var(--blue);font-family:var(--mono)}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px}
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab-btn{padding:8px 18px;border:none;background:none;color:var(--text3);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-btn:hover{color:var(--text)}
.tab-panel{display:none}.tab-panel.active{display:block}
.section{margin-bottom:24px}
.section-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:3px;background:var(--bg3);color:var(--text3)}
.add-form{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px}
.form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase}
.form-input,.form-select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:5px;font-size:13px;font-family:var(--font)}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--blue)}
.form-input.sm{width:90px}.form-input.mid{width:150px}.form-input.wide{width:220px}.form-select.mid{width:180px}
.form-msg{font-size:12px;min-height:16px;margin-top:4px}
.form-msg.ok{color:var(--green)}.form-msg.err{color:var(--red)}
.sym-wrap{position:relative}
.sym-dropdown{position:absolute;top:100%;left:0;width:280px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;z-index:100;display:none;max-height:200px;overflow-y:auto}
.sym-dd-item{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border)}
.sym-dd-item:last-child{border-bottom:none}
.sym-dd-item:hover{background:var(--bg3)}
.sym-dd-sym{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--text)}
.sym-dd-name{font-size:11px;color:var(--text3)}
.btn{padding:7px 16px;border-radius:5px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font)}
.btn:hover{opacity:.8}
.btn-green{background:var(--green);color:#000}
.btn-blue{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-dim)}
.btn-red{background:rgba(248,81,73,.15);color:var(--red)}
.btn-orange{background:rgba(240,136,62,.15);color:var(--orange)}
.btn-sm{padding:3px 10px;font-size:11px;border-radius:4px}
.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:9px 14px;color:var(--text3);font-size:11px;font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--bg3)}
.tbl td{padding:9px 14px;border-bottom:1px solid var(--border);color:var(--text2)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.sym-bold{font-weight:700;color:var(--text);font-family:var(--mono)}
.type-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase}
.type-etf{background:rgba(88,166,255,.15);color:var(--blue)}
.type-stock{background:rgba(63,185,80,.12);color:var(--green)}
.active-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.active-dot.on{background:var(--green)}.active-dot.off{background:var(--text3)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.filter-btn{padding:4px 12px;border-radius:5px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer}
.filter-btn.active{background:var(--blue-dim);color:var(--blue);border-color:var(--blue-dim)}
.etf-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:700;font-family:var(--mono);background:rgba(88,166,255,.12);color:var(--blue);margin:2px}
.etf-tag .rm{cursor:pointer;opacity:.6;font-size:10px}
.etf-tag .rm:hover{opacity:1;color:var(--red)}
.etf-primary{background:rgba(63,185,80,.15);color:var(--green)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:24px;width:440px;max-width:95vw}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{cursor:pointer;color:var(--text3);font-size:18px}
.modal-close:hover{color:var(--text)}
.loading{text-align:center;padding:24px;color:var(--text3)}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Dr<span>Balance</span> · 관리자</div>
  <a href="/" class="back-btn">← 대시보드로</a>
</div>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-title">🔐 관리자 인증</div>
    <div class="auth-sub">스크리너 관리 페이지</div>
    <input type="password" class="auth-input" id="secret-input" placeholder="Secret 입력">
    <button class="auth-btn" onclick="doAuth()">로그인</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<div id="main-screen">

  <div class="db-stats">
    <div class="stat-card"><div class="stat-num" id="stat-total">-</div><div class="stat-label">총 종목</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-active">-</div><div class="stat-label">모니터링 중</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-etf">-</div><div class="stat-label">ETF</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-stock">-</div><div class="stat-label">개별주</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-flow">-</div><div class="stat-label">오늘 플로우</div></div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('symbols')">📋 종목 관리</button>
    <button class="tab-btn" onclick="switchTab('sectors')">🗂 섹터 관리</button>
    <button class="tab-btn" onclick="switchTab('import')">📥 일괄 등록</button>
  </div>

  <!-- 탭1: 종목 관리 -->
  <div id="tab-symbols" class="tab-panel active">
    <div class="section">
      <div class="section-title">➕ 종목 추가</div>
      <div class="add-form">
        <div class="form-row">
          <div class="form-group">
            <label>티커 *</label>
            <div class="sym-wrap">
              <input class="form-input sm" id="f-symbol" placeholder="AAPL"
                oninput="onSymInput(this.value)" onkeydown="onSymKeydown(event)"
                style="text-transform:uppercase">
              <div class="sym-dropdown" id="sym-dd"></div>
            </div>
          </div>
          <div class="form-group">
            <label>회사명 *</label>
            <input class="form-input wide" id="f-name" placeholder="티커 입력 시 자동 조회">
          </div>
          <div class="form-group">
            <label>구분 *</label>
            <select class="form-select mid" id="f-type">
              <option value="stock">stock</option>
              <option value="etf">etf</option>
            </select>
          </div>
          <div class="form-group">
            <label>섹터 *</label>
            <select class="form-select mid" id="f-sector"></select>
          </div>
          <div class="form-group">
            <button class="btn btn-green" onclick="addSymbol()">+ 추가</button>
          </div>
        </div>
        <div class="form-msg" id="form-msg"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">
        📋 종목 목록
        <span class="badge" id="list-count">0개</span>
        <button class="btn btn-orange btn-sm" onclick="refreshSymbolNames()" style="margin-left:auto">
          🔄 종목명 갱신
        </button>
      </div>
      <div class="filter-row" id="sector-filters"></div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead>
            <tr><th>티커</th><th>회사명</th><th>구분</th><th>섹터</th><th>ETF 매핑</th><th>상태</th><th>액션</th></tr>
          </thead>
          <tbody id="sym-tbody"><tr><td colspan="7" class="loading">로딩 중...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 탭2: 섹터 관리 -->
  <div id="tab-sectors" class="tab-panel">
    <div class="section">
      <div class="section-title">➕ 섹터 추가</div>
      <div class="add-form">
        <div class="form-row">
          <div class="form-group">
            <label>섹터 키 *</label>
            <input class="form-input mid" id="s-key" placeholder="technology">
          </div>
          <div class="form-group">
            <label>섹터명 *</label>
            <input class="form-input mid" id="s-name" placeholder="기술">
          </div>
          <div class="form-group">
            <label>대표 ETF</label>
            <input class="form-input sm" id="s-etf" placeholder="XLK">
          </div>
          <div class="form-group">
            <label>정렬</label>
            <input class="form-input sm" id="s-order" placeholder="99" type="number">
          </div>
          <div class="form-group">
            <button class="btn btn-green" onclick="addSector()">+ 추가</button>
          </div>
        </div>
        <div class="form-msg" id="sector-msg"></div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">🗂 섹터 목록</div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>섹터 키</th><th>섹터명</th><th>대표 ETF</th><th>정렬</th><th>액션</th></tr></thead>
          <tbody id="sector-tbody"><tr><td colspan="5" class="loading">로딩 중...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 탭3: 일괄 등록 -->
  <div id="tab-import" class="tab-panel">
    <div class="section">
      <div class="section-title">📥 CSV 일괄 등록</div>
      <div class="add-form">
        <p style="color:var(--text3);font-size:13px;margin-bottom:12px">
          형식: <code style="font-family:var(--mono);color:var(--blue)">ETF,ETF_NAME,TICKER,WEIGHT</code>
          (WEIGHT 무시됨 — 종목과 ETF 매핑이 자동 등록됩니다)
        </p>
        <textarea id="csv-input" style="width:100%;height:220px;background:var(--bg3);
          border:1px solid var(--border);color:var(--text);padding:10px;border-radius:5px;
          font-family:var(--mono);font-size:12px;resize:vertical"
          placeholder="ETF,ETF_NAME,TICKER,WEIGHT&#10;XLK,Technology,AAPL,&#10;..."></textarea>
        <div style="display:flex;gap:10px;margin-top:10px;align-items:center">
          <button class="btn btn-green" onclick="runBulkImport()">📥 일괄 등록</button>
          <button class="btn btn-blue" onclick="loadDefaultCsv()">기본 CSV 불러오기</button>
          <div class="form-msg" id="import-msg" style="margin:0"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- ETF 매핑 모달 -->
<div class="modal-overlay" id="etf-modal">
  <div class="modal">
    <div class="modal-title">
      <span>🔗 ETF 매핑 — <span id="modal-sym">-</span></span>
      <span class="modal-close" onclick="closeEtfModal()">✕</span>
    </div>
    <div id="modal-etf-list" style="margin-bottom:16px;min-height:36px"></div>
    <div style="display:flex;gap:8px;align-items:center">
      <input class="form-input sm" id="modal-etf-input" placeholder="SMH"
        style="text-transform:uppercase">
      <label style="font-size:12px;color:var(--text3);display:flex;align-items:center;gap:4px;white-space:nowrap">
        <input type="checkbox" id="modal-primary"> Primary
      </label>
      <button class="btn btn-green btn-sm" onclick="addEtfMap()">추가</button>
    </div>
    <div class="form-msg" id="modal-msg" style="margin-top:8px"></div>
  </div>
</div>

<script>
const API = 'https://drbalance-dex.weoncheonlee.workers.dev';
let SECRET = '', allSymbols = [], allSectors = [], currentFilter = 'all';
let modalSym = '', symDdIdx = -1;

document.getElementById('secret-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doAuth();
});

async function doAuth() {
  SECRET = document.getElementById('secret-input').value.trim();
  if (!SECRET) return;
  try {
    const r = await api('GET', '/api/admin/stats');
    if (r.error === 'Unauthorized') {
      document.getElementById('auth-error').textContent = '❌ 잘못된 비밀번호';
      SECRET = ''; return;
    }
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    updateStats(r);
    await Promise.all([loadSectors(), loadSymbols()]);
  } catch { document.getElementById('auth-error').textContent = '❌ 서버 연결 실패'; }
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json', 'x-admin-secret': SECRET } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  return r.json();
}

function updateStats(d) {
  document.getElementById('stat-total').textContent  = d.total      ?? '-';
  document.getElementById('stat-active').textContent = d.active     ?? '-';
  document.getElementById('stat-etf').textContent    = d.etf        ?? '-';
  document.getElementById('stat-stock').textContent  = d.stock      ?? '-';
  document.getElementById('stat-flow').textContent   = d.flow_today ?? '-';
}

async function reloadStats() {
  updateStats(await api('GET', '/api/admin/stats'));
}

function switchTab(name) {
  const names = ['symbols','sectors','import'];
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', names[i]===name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

// ══ 섹터 ══
async function loadSectors() {
  const d = await api('GET', '/api/admin/sectors');
  allSectors = d.sectors || [];
  renderSectorTable(); renderSectorSelect(); renderSectorFilters();
}

function renderSectorTable() {
  const tbody = document.getElementById('sector-tbody');
  if (!allSectors.length) { tbody.innerHTML='<tr><td colspan="5" class="loading">섹터 없음</td></tr>'; return; }
  tbody.innerHTML = allSectors.map(s => `<tr>
    <td><span class="sym-bold">${s.sector_key}</span></td>
    <td>${s.sector_name}</td>
    <td style="font-family:var(--mono);color:var(--blue)">${s.primary_etf||'-'}</td>
    <td>${s.sort_order}</td>
    <td><button class="btn btn-red btn-sm" onclick="deleteSector('${s.sector_key}')">삭제</button></td>
  </tr>`).join('');
}

function renderSectorSelect() {
  document.getElementById('f-sector').innerHTML = allSectors.map(s =>
    `<option value="${s.sector_key}">${s.sector_name}</option>`).join('');
}

function renderSectorFilters() {
  document.getElementById('sector-filters').innerHTML =
    [{sector_key:'all',sector_name:'전체'}, ...allSectors].map(s => `
      <button class="filter-btn ${s.sector_key===currentFilter?'active':''}"
        onclick="setFilter('${s.sector_key}')">${s.sector_name}</button>`).join('');
}

async function addSector() {
  const sector_key  = document.getElementById('s-key').value.trim().toLowerCase();
  const sector_name = document.getElementById('s-name').value.trim();
  const primary_etf = document.getElementById('s-etf').value.trim().toUpperCase()||null;
  const sort_order  = parseInt(document.getElementById('s-order').value)||99;
  const msg = document.getElementById('sector-msg');
  if (!sector_key||!sector_name) { msg.className='form-msg err'; msg.textContent='❌ 키와 이름 필수'; return; }
  const d = await api('POST','/api/admin/sectors',{sector_key,sector_name,primary_etf,sort_order});
  if (d.error) { msg.className='form-msg err'; msg.textContent='❌ '+d.error; return; }
  msg.className='form-msg ok'; msg.textContent='✅ 추가 완료';
  ['s-key','s-name','s-etf'].forEach(id => document.getElementById(id).value='');
  await loadSectors();
}

async function deleteSector(key) {
  if (!confirm(`"${key}" 섹터를 삭제하시겠습니까?`)) return;
  await api('DELETE',`/api/admin/sectors/${key}`);
  await loadSectors();
}

// ══ 종목 ══
async function loadSymbols() {
  const d = await api('GET','/api/admin/symbols');
  allSymbols = d.symbols||[];
  renderSymbolTable();
}

function setFilter(sector) {
  currentFilter=sector; renderSectorFilters(); renderSymbolTable();
}

function renderSymbolTable() {
  const filtered = currentFilter==='all' ? allSymbols : allSymbols.filter(s=>s.sector===currentFilter);
  document.getElementById('list-count').textContent = filtered.length+'개';
  const sn = {}; allSectors.forEach(s => sn[s.sector_key]=s.sector_name);
  const tbody = document.getElementById('sym-tbody');
  if (!filtered.length) { tbody.innerHTML='<tr><td colspan="7" class="loading">종목 없음</td></tr>'; return; }
  tbody.innerHTML = filtered.map(s => {
    const etfs = s.etf_list ? s.etf_list.split(',').map(e=>e.trim()).filter(Boolean) : [];
    const etfTags = etfs.map(e=>`<span class="etf-tag">${e}
      <span class="rm" onclick="removeEtfTag('${s.symbol}','${e}')">✕</span></span>`).join('');
    return `<tr>
      <td><span class="sym-bold">${s.symbol}</span></td>
      <td style="color:var(--text)">${s.name}</td>
      <td><span class="type-badge type-${s.type}">${s.type}</span></td>
      <td>${sn[s.sector]||s.sector}</td>
      <td>${etfTags}<span class="etf-tag" style="cursor:pointer;opacity:.5" onclick="openEtfModal('${s.symbol}')">+ETF</span></td>
      <td><span class="active-dot ${s.is_active?'on':'off'}"></span>
        <span style="color:${s.is_active?'var(--green)':'var(--text3)'}">${s.is_active?'모니터링':'중지'}</span></td>
      <td style="white-space:nowrap">
        <button class="btn btn-blue btn-sm" onclick="toggleSymbol('${s.symbol}',${s.is_active})">${s.is_active?'중지':'재개'}</button>
        <button class="btn btn-red btn-sm" style="margin-left:4px" onclick="deleteSymbol('${s.symbol}')">삭제</button>
      </td></tr>`;
  }).join('');
}

// 자동완성
async function onSymInput(val) {
  const q=val.trim().toUpperCase(), dd=document.getElementById('sym-dd');
  symDdIdx=-1;
  if (!q) { dd.style.display='none'; return; }
  try {
    const r = await fetch(`${API}/api/symbols?q=${encodeURIComponent(q)}`);
    const d = await r.json();
    renderSymDd(d.symbols||[]);
  } catch { dd.style.display='none'; }
}

function renderSymDd(list) {
  const dd=document.getElementById('sym-dd');
  if (!list.length) { dd.style.display='none'; return; }
  dd.innerHTML = list.slice(0,8).map(item=>`
    <div class="sym-dd-item" data-sym="${item.symbol}" data-name="${(item.name||'').replace(/"/g,'')}"
      onclick="selectSym('${item.symbol}','${(item.name||'').replace(/'/g,"\\'")}')">
      <div class="sym-dd-sym">${item.symbol}</div>
      ${item.name?`<div class="sym-dd-name">${item.name}</div>`:''}
    </div>`).join('');
  dd.style.display='block';
}

function onSymKeydown(e) {
  const items=document.querySelectorAll('.sym-dd-item');
  if (e.key==='ArrowDown'){e.preventDefault();symDdIdx=Math.min(symDdIdx+1,items.length-1);highlightDd();}
  else if (e.key==='ArrowUp'){e.preventDefault();symDdIdx=Math.max(symDdIdx-1,0);highlightDd();}
  else if (e.key==='Enter'){
    e.preventDefault();
    if (symDdIdx>=0&&items[symDdIdx]) selectSym(items[symDdIdx].dataset.sym,items[symDdIdx].dataset.name);
    else { document.getElementById('sym-dd').style.display='none'; fetchSymbolName(); }
  }
  else if (e.key==='Escape') document.getElementById('sym-dd').style.display='none';
}

function highlightDd() {
  document.querySelectorAll('.sym-dd-item').forEach((el,i)=>el.style.background=i===symDdIdx?'var(--bg3)':'');
}

function selectSym(sym,name) {
  document.getElementById('f-symbol').value=sym;
  document.getElementById('f-name').value=name;
  document.getElementById('sym-dd').style.display='none';
}

// DB에 없으면 Worker를 통해 Twelve Data에서 조회
async function fetchSymbolName() {
  const sym=document.getElementById('f-symbol').value.trim().toUpperCase();
  if (!sym) return;
  try {
    const r=await fetch(`${API}/api/admin/quote?symbol=${sym}`,{headers:{'x-admin-secret':SECRET}});
    const d=await r.json();
    if (d.name) document.getElementById('f-name').value=d.name;
  } catch {}
}

async function addSymbol() {
  const symbol=document.getElementById('f-symbol').value.trim().toUpperCase();
  const name=document.getElementById('f-name').value.trim();
  const type=document.getElementById('f-type').value;
  const sector=document.getElementById('f-sector').value;
  const msg=document.getElementById('form-msg');
  if (!symbol||!name){msg.className='form-msg err';msg.textContent='❌ 티커와 회사명 필수';return;}
  msg.className='form-msg';msg.textContent='추가 중...';
  const d=await api('POST','/api/admin/symbols',{symbol,name,type,sector});
  if (d.error){msg.className='form-msg err';msg.textContent='❌ '+d.error;return;}
  msg.className='form-msg ok';msg.textContent=`✅ ${symbol} 추가 완료`;
  document.getElementById('f-symbol').value='';
  document.getElementById('f-name').value='';
  await loadSymbols(); reloadStats();
}

async function refreshSymbolNames() {
  if (!confirm('Twelve Data로 모든 종목명을 갱신합니다. 계속하시겠습니까?')) return;
  const btn=event.target; btn.disabled=true; btn.textContent='🔄 갱신 중...';
  const d=await api('POST','/api/admin/symbols/refresh');
  btn.disabled=false; btn.textContent='🔄 종목명 갱신';
  if (d.ok) { alert(`✅ 갱신 완료\n업데이트: ${d.updated?.length||0}개 / 실패: ${d.failed?.length||0}개`); await loadSymbols(); }
  else alert('❌ 실패: '+(d.error||'알 수 없는 오류'));
}

async function toggleSymbol(symbol,current) {
  await api('PATCH',`/api/admin/symbols/${symbol}`,{is_active:current?0:1});
  await loadSymbols();
}

async function deleteSymbol(symbol) {
  if (!confirm(`${symbol}을 삭제하시겠습니까?\n관련 데이터도 모두 삭제됩니다.`)) return;
  await api('DELETE',`/api/admin/symbols/${symbol}`);
  await loadSymbols(); reloadStats();
}

// ══ ETF 매핑 모달 ══
async function openEtfModal(sym) {
  modalSym=sym;
  document.getElementById('modal-sym').textContent=sym;
  document.getElementById('modal-msg').textContent='';
  document.getElementById('etf-modal').classList.add('open');
  await renderModalEtfs();
}

function closeEtfModal() {
  document.getElementById('etf-modal').classList.remove('open'); modalSym='';
}

async function renderModalEtfs() {
  const d=await api('GET',`/api/admin/symbol-etf-map/${modalSym}`);
  const list=document.getElementById('modal-etf-list');
  if (!d.etfs?.length){list.innerHTML='<span style="color:var(--text3);font-size:13px">매핑 없음</span>';return;}
  list.innerHTML=d.etfs.map(e=>`
    <span class="etf-tag ${e.is_primary?'etf-primary':''}">
      ${e.etf}${e.is_primary?' ★':''}
      <span class="rm" onclick="removeEtfMap('${e.etf}')">✕</span>
    </span>`).join('');
}

async function addEtfMap() {
  const etf=document.getElementById('modal-etf-input').value.trim().toUpperCase();
  const is_primary=document.getElementById('modal-primary').checked?1:0;
  const msg=document.getElementById('modal-msg');
  if (!etf){msg.className='form-msg err';msg.textContent='❌ ETF 입력 필요';return;}
  const d=await api('POST','/api/admin/symbol-etf-map',{symbol:modalSym,etf,is_primary});
  if (d.error){msg.className='form-msg err';msg.textContent='❌ '+d.error;return;}
  msg.className='form-msg ok';msg.textContent='✅ 추가됨';
  document.getElementById('modal-etf-input').value='';
  document.getElementById('modal-primary').checked=false;
  await renderModalEtfs(); await loadSymbols();
}

async function removeEtfMap(etf) {
  await api('DELETE','/api/admin/symbol-etf-map',{symbol:modalSym,etf});
  await renderModalEtfs(); await loadSymbols();
}

async function removeEtfTag(symbol,etf) {
  await api('DELETE','/api/admin/symbol-etf-map',{symbol,etf});
  await loadSymbols();
}

async function runBulkImport() {
  const raw=document.getElementById('csv-input').value.trim();
  const msg=document.getElementById('import-msg');
  if (!raw){msg.className='form-msg err';msg.textContent='❌ CSV 입력 필요';return;}
  const lines=raw.split('\n').slice(1);
  const rows=lines.map(line=>{
    const [etf,etf_name,ticker]=line.split(',');
    return {etf:etf?.trim(),etf_name:etf_name?.trim(),ticker:ticker?.trim()};
  }).filter(r=>r.etf&&r.ticker);
  msg.className='form-msg';msg.textContent=`${rows.length}개 처리 중...`;
  const d=await api('POST','/api/admin/bulk-import',{rows});
  if (d.error){msg.className='form-msg err';msg.textContent='❌ '+d.error;return;}
  msg.className='form-msg ok';
  msg.textContent=`✅ 완료 — 종목 ${d.symbols}개, 매핑 ${d.maps}개`;
  await loadSymbols(); reloadStats();
}
